<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Black background -->
  <rect width="100" height="100" fill="#000000"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#dc2626" stroke-width="3"/>

  <!-- Middle ring -->
  <circle cx="50" cy="50" r="26" fill="none" stroke="#dc2626" stroke-width="2"/>

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="#dc2626" stroke-width="2"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="3.5" fill="#dc2626"/>

  <!-- Crosshair lines — top -->
  <line x1="50" y1="2" x2="50" y2="34" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <!-- bottom -->
  <line x1="50" y1="66" x2="50" y2="98" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <!-- left -->
  <line x1="2" y1="50" x2="34" y2="50" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <!-- right -->
  <line x1="66" y1="50" x2="98" y2="50" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>

  <!-- Small tick marks on outer ring (NE, SE, SW, NW) for precision feel -->
  <line x1="76" y1="24" x2="72" y2="28" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="76" y1="76" x2="72" y2="72" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="76" x2="28" y2="72" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="28" y2="28" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
</svg>
