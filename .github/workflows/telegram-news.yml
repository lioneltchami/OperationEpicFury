name: Telegram News Processing

on:
  repository_dispatch:
    types: [telegram_news]

jobs:
  process-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Process news with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "WebFetch,Bash(curl:*)"'
          prompt: |
            You received a news message from Telegram. Process it into a timeline event for the Operation Epic Fury timeline (Iran-Israel-US military conflict, started February 28 2026).

            ## Input

            Text: ${{ github.event.client_payload.text }}
            URLs: ${{ github.event.client_payload.urls }}
            Forward origin: ${{ github.event.client_payload.forward_origin }}
            Forward message link: ${{ github.event.client_payload.forward_message_link }}
            Timestamp (ET): ${{ github.event.client_payload.timestamp_et }}
            Media JSON: ${{ github.event.client_payload.media }}
            Media group ID: ${{ github.event.client_payload.media_group_id }}
            Chat ID: ${{ github.event.client_payload.chat_id }}
            Message ID: ${{ github.event.client_payload.message_id }}

            ## Step 1: Gather content

            Use the provided text and forward origin as the source material.

            If URLs are provided AND no "Media JSON" was included:
            1. First extract the og:image using curl (WebFetch strips meta tags):
               ```
               curl -sL "<first URL>" | grep -o 'og:image[^>]*content="[^"]*"' | head -1
               ```
               If found, use this image URL as media: `[{"fileId": "", "type": "photo", "url": "<extracted-url>"}]`
            2. Then fetch the URL with WebFetch for article text/context.

            If the text starts with "[Tweet by ...]", this is a tweet. Use the author as the source name and the URL as sourceUrl. The tweet text is already extracted — no need to fetch the URL.
            Do NOT search the web. Do NOT use any source other than what was provided in the input above.

            ## Step 2: Check for duplicates

            Fetch existing events (headline + timestamp) to check for duplicates:
            ```
            curl -s "${{ vars.SITE_URL }}/api/events" | jq -r '.[] | "\(.timeET) | \(.headline)"'
            ```

            An event is ONLY a duplicate if it describes the **exact same incident at the same time**. Be lenient — when in doubt, it is NOT a duplicate. Specifically:
            - Same person making the same statement on a DIFFERENT date → NOT a duplicate (it's a repeated/reinforced statement)
            - Same topic but new details, developments, or a different angle → NOT a duplicate
            - Same general subject (e.g. "strikes on Tehran") but different specific events → NOT a duplicate
            - Only flag as duplicate if the headline, time, and specific facts are essentially identical

            If it IS a genuine duplicate, report via callback AND include the matching event's headline and time so the user knows what it matched:
            ```
            curl -sf -X POST "${{ vars.SITE_URL }}/api/telegram/callback" \
              -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{"chat_id": ${{ github.event.client_payload.chat_id }}, "message_id": ${{ github.event.client_payload.message_id }}, "status": "error", "error": "Duplicate of: [<timeET>] <matching headline>"}'
            ```
            Then stop.

            ## Step 3: Get the timestamp

            The "Timestamp (ET)" field above contains the pre-computed timestamp from the forwarded Telegram message, already converted to America/New_York timezone in "YYYY-MM-DD HH:MM" format.

            Use this value directly as timeET. Do NOT search Telegram channels for timestamps. Do NOT leave timeET empty — the timestamp is already provided.

            ## Step 4: Extract structured data

            From the content, determine:
            - **headline**: English, concise, news-style (who did what)
            - **body**: English, **MANDATORY** — ALWAYS write 2-4 factual sentences in AP news style.
              - If the source text is short (e.g. a photo caption), expand it using the context of the conflict and what is known about the event. Do NOT leave body empty or shorter than 2 sentences.
              - If you cannot write at least 2 sentences, write what is known and add context about why this event matters to the conflict.
            - **timeET**: From Step 3 above
            - **category**: One of: strike, retaliation, announcement, casualty, world-reaction, breaking, breaking-important
            - **source**: The Telegram channel name or original source mentioned in the forwarded message
            - **sourceUrl**: Use "Forward message link" if provided (this is the direct link to the Telegram post). Otherwise use the URL from the input.
            - **sourceRegion**: Determine the region of the source: "us", "eu", "middle-east", "asia", or "other". For Telegram channels, use "other" if unclear.
            - **confidence**: Always "unconfirmed" for single-source Telegram messages
            - **sources**: Array with one entry: [{"name": "<source>", "url": "<sourceUrl>", "region": "<sourceRegion>"}]
            - **breaking**: true only for major developments

            ## Step 5: Translate to French

            Translate headline and body to French:
            - Write natural, fluent French in formal news style
            - Use standard French forms for proper nouns (ایران, آمریکا, اسرائیل)

            CRITICAL: Write French characters, NEVER as \u escape sequences.

            ## Geocoding (MANDATORY)

            Determine the PRIMARY geographic location of this event. Every military conflict event happens somewhere specific.

            Common locations for this conflict (use these coordinates):
            - Tehran, Iran: { "name": "Tehran, Iran", "lat": 35.6892, "lng": 51.3890 }
            - Isfahan, Iran: { "name": "Isfahan, Iran", "lat": 32.6546, "lng": 51.6680 }
            - Bushehr, Iran: { "name": "Bushehr, Iran", "lat": 28.9234, "lng": 50.8203 }
            - Bandar Abbas, Iran: { "name": "Bandar Abbas, Iran", "lat": 27.1865, "lng": 56.2808 }
            - Natanz, Iran: { "name": "Natanz, Iran", "lat": 33.5131, "lng": 51.9165 }
            - Fordow, Iran: { "name": "Fordow, Iran", "lat": 34.8800, "lng": 51.9842 }
            - Kharg Island, Iran: { "name": "Kharg Island, Iran", "lat": 29.2333, "lng": 50.3167 }
            - Strait of Hormuz: { "name": "Strait of Hormuz", "lat": 26.5667, "lng": 56.2500 }
            - Tel Aviv, Israel: { "name": "Tel Aviv, Israel", "lat": 32.0853, "lng": 34.7818 }
            - Jerusalem, Israel: { "name": "Jerusalem, Israel", "lat": 31.7683, "lng": 35.2137 }
            - Haifa, Israel: { "name": "Haifa, Israel", "lat": 32.7940, "lng": 34.9896 }
            - Dimona, Israel: { "name": "Dimona, Israel", "lat": 31.0680, "lng": 35.0338 }
            - Nevatim Air Base, Israel: { "name": "Nevatim Air Base, Israel", "lat": 31.2083, "lng": 34.9389 }
            - Beirut, Lebanon: { "name": "Beirut, Lebanon", "lat": 33.8938, "lng": 35.5018 }
            - Damascus, Syria: { "name": "Damascus, Syria", "lat": 33.5138, "lng": 36.2765 }
            - Baghdad, Iraq: { "name": "Baghdad, Iraq", "lat": 33.3152, "lng": 44.3661 }
            - Riyadh, Saudi Arabia: { "name": "Riyadh, Saudi Arabia", "lat": 24.7136, "lng": 46.6753 }
            - Washington D.C., USA: { "name": "Washington D.C., USA", "lat": 38.9072, "lng": -77.0369 }
            - Pentagon, USA: { "name": "Pentagon, Virginia, USA", "lat": 38.8719, "lng": -77.0563 }
            - United Nations, NYC: { "name": "United Nations, New York, USA", "lat": 40.7489, "lng": -73.9680 }
            - Brussels, Belgium (NATO): { "name": "NATO HQ, Brussels, Belgium", "lat": 50.8503, "lng": 4.3517 }
            - Persian Gulf: { "name": "Persian Gulf", "lat": 26.0000, "lng": 52.0000 }
            - Red Sea: { "name": "Red Sea", "lat": 20.0000, "lng": 38.0000 }
            - Mediterranean Sea: { "name": "Eastern Mediterranean Sea", "lat": 34.0000, "lng": 33.0000 }

            For locations not in this list, estimate the lat/lng based on the city/region name.
            For diplomatic statements or announcements, use the location where the statement was made (e.g., White House = Washington D.C.).
            If you truly cannot determine ANY location, omit the location field -- but this should be rare. Almost every event has a location.

            Include in your POST payload:
            "location": { "name": "<place name>", "lat": <latitude>, "lng": <longitude> }

            ## Step 6: Create draft event

            POST the event to the API.

            MEDIA HANDLING (CRITICAL):
            - Look at the "Media JSON" field from the Input section above.
            - If it contains a JSON array (starts with `[`), you MUST include it as the `media` field in your POST payload. Copy the value EXACTLY as-is -- do NOT wrap it in quotes, do NOT modify it, do NOT omit it.
            - If "Media group ID" is provided and non-empty, include it as `media_group_id`.
            - If "Media JSON" is empty or not provided, omit the `media` field entirely.

            ```
            curl -sf -X POST "${{ vars.SITE_URL }}/api/events/publish" \
              -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{
                "timeET": "<YYYY-MM-DD HH:MM>",
                "headline": "<English headline>",
                "body": "<English body>",
                "category": "<category>",
                "source": "<source name>",
                "sourceUrl": "<source url>",
                "sourceRegion": "<us|eu|middle-east|asia|other>",
                "confidence": "unconfirmed",
                "sources": [{"name": "<source name>", "url": "<source url>", "region": "<us|eu|middle-east|asia|other>"}],
                "breaking": <true|false>,
                "headline_fr": "<French headline>",
                "body_fr": "<French body>",
                "media": <PASTE Media JSON here as raw JSON array, NOT as a string>,
                "media_group_id": "<media_group_id or omit if empty>",
                "location": {"name": "<location name>", "lat": <latitude>, "lng": <longitude>},
                "status": "draft"
              }'
            ```

            Save the response — it contains the event `id`.

            ## Step 7: Send callback notification

            On success, notify the user:
            ```
            curl -sf -X POST "${{ vars.SITE_URL }}/api/telegram/callback" \
              -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{"chat_id": ${{ github.event.client_payload.chat_id }}, "message_id": ${{ github.event.client_payload.message_id }}, "headline": "<the headline>", "event_id": "<the id>", "status": "success"}'
            ```

            On failure at any step, send an error callback instead:
            ```
            curl -sf -X POST "${{ vars.SITE_URL }}/api/telegram/callback" \
              -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{"chat_id": ${{ github.event.client_payload.chat_id }}, "message_id": ${{ github.event.client_payload.message_id }}, "status": "error", "error": "<what went wrong>"}'
            ```

            CRITICAL RULES:
            - Do NOT use web search. Do NOT use any source beyond the input provided.
            - Use the pre-computed "Timestamp (ET)" from the Input directly as timeET. NEVER leave timeET empty.
            - **body is MANDATORY** — always write at least 2 full sentences (minimum 10 characters). The API WILL REJECT events with empty body. If the source is sparse, add factual context.
            - **media is MANDATORY when provided** — if the Input has "Media JSON" with a JSON array, you MUST include it in the POST. The API will accept it. Omitting media when it was provided is a failure.
            - **location is MANDATORY when determinable** — use the reference coordinates list in the Geocoding section. Almost every event has a location.
            - All French text must be raw UTF-8 characters, NEVER \u escape sequences.
            - All JSON must be valid. Escape double quotes inside strings.
            - STRICT DATE: This timeline covers events from February 28, 2026 onward. Reject anything before that date.
