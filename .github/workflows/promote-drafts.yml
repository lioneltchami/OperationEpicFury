name: Promote Draft Events

on:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  promote:
    if: ${{ vars.AUTO_PUBLISH_ENABLED != 'false' }}
    runs-on: ["self-hosted", "Linux", "X64", "proxmox", "lxc", "debian"]
    steps:
      - name: Promote aged drafts
        run: |
          curl -sf -X POST "${{ vars.SITE_URL }}/api/cron/promote-drafts" \
            -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}" \
            -H "Content-Type: application/json"
