name: Auto News Gathering

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      batch:
        description: "Run a specific batch only (1=wire/center, 2=US left+right, 3=regional). Leave empty for all."
        required: false
        type: choice
        options:
          - all
          - "1"
          - "2"
          - "3"

jobs:
  # ── Batch 1: Wire services + Center (most factual, least bias) ──
  batch-wire-center:
    if: >-
      ${{ vars.AUTO_PUBLISH_ENABLED != 'false' &&
          (github.event_name == 'schedule' || github.event.inputs.batch == 'all' || github.event.inputs.batch == '1') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Gather news — Wire services & Center
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "WebFetch,Bash(gh issue create:*),Bash(gh issue list:*),Bash(curl:*)"'
          prompt: |
            You are an autonomous news aggregation agent for the Operation Epic Fury timeline (Iran-Israel-US military conflict, started Feb 28 2026).
            Your job: find NEW developments, score their confidence, and auto-publish or flag for review.

            YOUR ONLY NEWS SOURCES for this batch are these WIRE SERVICES & CENTER outlets:
            - Reuters (Center, Global, High reliability): https://www.reuters.com/
            - Associated Press (Center, Global, High reliability): https://apnews.com/
            - BBC News (Center, EU/Global, High reliability): https://www.bbc.com/news
            - Al-Monitor (Center, Middle East, High reliability): https://www.al-monitor.com/

            Do NOT use web search or any other source not listed above.

            ## Step 1: Get existing events for dedup

            Fetch recent event headlines from the live API:
            ```
            curl -s "${{ vars.SITE_URL }}/api/events/recent?hours=12" | jq -r '.[] | "\(.timeET) | \(.headline)"'
            ```
            Also check pending GitHub issues:
            ```
            gh issue list --repo ${{ github.repository }} --label "pending-review" --state open --limit 100 --json title -q '.[].title'
            ```

            When checking for duplicates, compare SEMANTIC meaning, not just exact text.
            "Iran launches missiles at Israel" and "Iranian missile strike hits Israeli territory" describe the SAME event.
            Compare WHO, WHAT, WHERE, WHEN -- if all four match within a 2-hour window, it IS a duplicate.
            Only flag as duplicate if the core facts are the same. New details or angles on an existing event are NOT duplicates.

            ## Step 2: Fetch latest articles

            Fetch the front page / main section from EACH source using WebFetch.
            Identify new developments SPECIFICALLY about Operation Epic Fury (Iran-Israel-US military conflict).
            IGNORE any news NOT about Operation Epic Fury.
            Extract the article's published timestamp.

            For EACH article about Operation Epic Fury:
            - Extract headline, body text, publication timestamp
            - Extract the article's og:image URL (look for `<meta property="og:image" content="...">`)
            - Identify which other sources (from this batch) cover the same event

            ## Step 3: Score confidence for each event

            For each new event, calculate a confidence score (0-100):
            - 2+ sources from different outlets confirm same event: +40
            - Wire service (Reuters, AP) is one of the sources: +20
            - 3+ total sources covering same event: +15
            - Timestamps from multiple sources agree (within 1 hour): +10
            - NOT sourced solely from state media (IRNA): +10
            - Category is NOT "breaking-important": +5

            ## Step 4: Route events based on score

            **Score >= 70 (auto-publish):**
            POST directly to the publish API with status "published":
            ```
            curl -sf -X POST "${{ vars.SITE_URL }}/api/events/publish" \
              -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{
                "timeET": "<YYYY-MM-DD HH:MM>",
                "headline": "<headline>",
                "body": "<body -- MANDATORY, minimum 2 sentences, AP style>",
                "category": "<category>",
                "source": "<primary source>",
                "sourceUrl": "<primary article url>",
                "sourceRegion": "<region>",
                "confidence": "confirmed",
                "sources": [{"name": "<outlet>", "url": "<article url>", "region": "<region>"}],
                "breaking": <true|false>,
                "headline_fr": "<French headline>",
                "body_fr": "<French body>",
                "media": [{"fileId": "", "type": "photo", "url": "<og:image url>"}],
                "status": "published"
              }'
            ```

            **Score 40-69 (auto-draft):**
            Same POST but with `"status": "draft"` and `"confidence": "unconfirmed"`. The draft will auto-promote to published after 30 minutes.
            ```
            curl -sf -X POST "${{ vars.SITE_URL }}/api/events/publish" \
              -H "Authorization: Bearer ${{ secrets.PUBLISH_SECRET }}" \
              -H "Content-Type: application/json" \
              -d '{
                "timeET": "<YYYY-MM-DD HH:MM>",
                "headline": "<headline>",
                "body": "<body -- MANDATORY, minimum 2 sentences, AP style>",
                "category": "<category>",
                "source": "<primary source>",
                "sourceUrl": "<primary article url>",
                "sourceRegion": "<region>",
                "confidence": "unconfirmed",
                "sources": [{"name": "<outlet>", "url": "<article url>", "region": "<region>"}],
                "breaking": <true|false>,
                "headline_fr": "<French headline>",
                "body_fr": "<French body>",
                "media": [{"fileId": "", "type": "photo", "url": "<og:image url>"}],
                "status": "draft"
              }'
            ```

            **Score < 40 (manual review):**
            Create a GitHub issue as a fallback for low-confidence events:
            ```
            gh issue create --repo ${{ github.repository }} \
              --title "[News] <English headline>" \
              --label "pending-review" \
              --label "cat:<category>" \
              --body "$(cat <<'ISSUE_EOF'
            ## Candidate Event -- Low Confidence (Score: <score>)

            **Category:** `<category>`
            **Source:** [<news outlet name>](<link to the article>)
            **Source Bias:** `<center|lean-left|lean-right|right>`
            **Source Region:** `<us|eu|middle-east|asia|global>`
            **Confidence Score:** `<score>/100`

            ### English
            **<headline>**

            <body -- 2-4 sentences, factual>

            ### Français
            **<headline_fr>**

            <body_fr>

            ---

            <details>
            <summary>Event JSON</summary>

            ```json
            {
              "timeET": "<YYYY-MM-DD HH:MM>",
              "headline": "<English headline>",
              "body": "<English body>",
              "category": "<category>",
              "source": "<news outlet name>",
              "sourceUrl": "<link to the article>",
              "sourceRegion": "<us|eu|middle-east|asia|global>",
              "confidence": "unconfirmed",
              "sources": [{"name": "<outlet>", "url": "<article url>", "region": "<region>"}],
              "breaking": <true|false>,
              "headline_fr": "<French headline>",
              "body_fr": "<French body>",
              "media": [{"fileId": "", "type": "photo", "url": "<og:image url>"}]
            }
            ```

            </details>

            ISSUE_EOF
            )"
            ```

            LIMITS: Publish at most 5 events per run. If more than 5 events qualify for auto-publish (score >= 40), pick the top 5 by score. Create issues for the rest.

            ## Step 5: Extract structured data

            For each event:
            - **headline**: English, concise, news-style
            - **body**: English, MANDATORY -- 2-4 factual sentences in AP style. The API WILL REJECT empty body. Minimum 10 characters.
            - **timeET**: Article's publication time in ET (America/New_York). Format: "YYYY-MM-DD HH:MM".
            - **category**: strike, retaliation, announcement, casualty, world-reaction, breaking, breaking-important
            - **source**: Primary outlet name
            - **sourceUrl**: Primary article URL
            - **sourceRegion**: us, eu, middle-east, asia, global
            - **confidence**: "confirmed" (score >= 70) or "unconfirmed" (score < 70)
            - **sources**: Array of ALL confirming sources as [{"name": "<outlet>", "url": "<url>", "region": "<region>"}]
            - **media**: Include og:image as [{"fileId": "", "type": "photo", "url": "<og:image>"}]. MANDATORY when image available. Omit field only if no og:image found.
            - **headline_fr / body_fr**: French translation, raw UTF-8, NEVER \u escapes

            CRITICAL RULES:
            - body is MANDATORY (min 10 chars). API rejects empty body.
            - media: ALWAYS include og:image when available. Omitting available images is a failure.
            - French text: raw UTF-8, NEVER \u escape sequences.
            - JSON must be valid. Escape double quotes in strings.
            - STRICT DATE: Only events from Feb 28, 2026 onward.
            - ONLY TOPIC: Operation Epic Fury. Ignore ALL other news.
            - ONLY source: The four news websites listed above. Do NOT use web search or any other website.
            - TIMESTAMP: Use the article's published timestamp. Convert to ET (America/New_York).

            ## Cross-checking rules:
            - If 3+ sources from different bias categories report the same event, set confidence to "confirmed"
            - If only sources from one bias category report it, set confidence to "unconfirmed"
            - If sources contradict each other on key facts, set confidence to "disputed"
            - Always note which sources agree and which disagree
            - NEVER trust a single source for casualty numbers -- require 2+ sources
            - State media (IRNA) should be labeled as such and cross-checked against independent sources

