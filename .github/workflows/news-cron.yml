            ## Step 5: Extract structured data

            For each event:
            - **headline**: English, concise, news-style
            - **body**: English, MANDATORY -- 2-4 factual sentences in AP style. The API WILL REJECT empty body. Minimum 10 characters. If sourced from IRNA, prefix body with "According to Iranian state media, ..."
            - **timeET**: Article's publication time in ET (America/New_York). Format: "YYYY-MM-DD HH:MM".
            - **category**: strike, retaliation, announcement, casualty, world-reaction, breaking, breaking-important
            - **source**: Primary outlet name
            - **sourceUrl**: Primary article URL
            - **sourceRegion**: us, eu, middle-east, asia, global
            - **confidence**: "confirmed" (score >= 70) or "unconfirmed" (score < 70) or "disputed" (sources contradict)
            - **sources**: Array of ALL confirming sources as [{"name": "<outlet>", "url": "<url>", "region": "<region>"}]
            - **media**: Include og:image as [{"fileId": "", "type": "photo", "url": "<og:image>"}]. MANDATORY when image available. Omit field only if no og:image found.
            - **headline_fr / body_fr**: French translation, raw UTF-8, NEVER \u escapes

            CRITICAL RULES:
            - body is MANDATORY (min 10 chars). API rejects empty body.
            - media: ALWAYS include og:image when available. Omitting available images is a failure.
            - French text: raw UTF-8, NEVER \u escape sequences.
            - JSON must be valid. Escape double quotes in strings.
            - STRICT DATE: Only events from Feb 28, 2026 onward.
            - ONLY TOPIC: Operation Epic Fury. Ignore ALL other news.
            - ONLY source: The five news websites listed above. Do NOT use web search or any other website.
            - TIMESTAMP: Use the article's published timestamp. Convert to ET (America/New_York).
            - IRNA-only events should have confidence "unconfirmed". If IRNA contradicts other sources, set confidence to "disputed".

            ## Cross-checking rules:
            - If 3+ sources from different bias categories report the same event, set confidence to "confirmed"
            - If only sources from one bias category report it, set confidence to "unconfirmed"
            - If sources contradict each other on key facts, set confidence to "disputed"
            - Always note which sources agree and which disagree
            - NEVER trust a single source for casualty numbers -- require 2+ sources
            - State media (IRNA) should be labeled as such and cross-checked against independent sources
            - IRNA claims that cannot be verified by any other source in this batch should be flagged as "unconfirmed" with a note
