<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Operation Epic Fury</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #a1a1aa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    h1 { color: #fff; font-size: 1.5rem; margin-bottom: 1rem; }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    p { line-height: 1.6; margin-bottom: 0.75rem; }
    .hint { font-size: 0.875rem; color: #71717a; }
    a { color: #ef4444; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .retry {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      border: 1px solid #dc2626;
      color: #dc2626;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
      background: transparent;
      transition: background 0.2s, color 0.2s;
    }
    .retry:hover { background: #dc2626; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Previously loaded events are still available — go back to see them.</p>
    <p class="hint">You can also <a href="/api/rss">subscribe via RSS</a> to follow events.</p>
    <button class="retry" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
